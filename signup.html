<!DOCTYPE html>

<body>

<h2>Start Free Trial</h2>

<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>

<button onclick="goApp()">Start</button>

<script>
function getModule(){
 const p = new URLSearchParams(window.location.search);
 return p.get("module") || "fpa";
}

function goApp(){
 const m = getModule();
 window.location.href = "https://fincy-intelligence.streamlit.app/?module=" + m;
}
</script>
